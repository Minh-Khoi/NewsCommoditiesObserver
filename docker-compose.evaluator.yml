version: '3.8'

services:
  # Evaluator (The Judge)
  # Áp dụng Liskov Substitution: Có thể thay đổi model giám khảo dễ dàng
  rag_evaluator:
    build: ./evaluator
    container_name: rag_quality_test
    volumes:
      - ./tests:/app/tests
      - ./results:/app/results
    environment:
      - TARGET_API_URL=http://rag_query_api:8000
      - LLM_API_URL=http://intelligence_hub:11434
      - EVAL_MODEL=gemma2:2b # Model AI giỏi nhất dùng để test
      - EVAL_METRICS=faithfulness,relevance,context_precision
    networks:
      - rag_internal 
      - shared_pipeline # Kết nối tới LLM Hub

networks:
  rag_internal:
    external: true # Kết nối với network của cụm RAG